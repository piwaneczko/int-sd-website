<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>

  <!-- Grid lines (subtle) -->
  <line x1="3" y1="24" x2="29" y2="24" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="3" y1="17" x2="29" y2="17" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="3" y1="10" x2="29" y2="10" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Rising bars -->
  <rect x="4"  y="20" width="4" height="5" rx="1" fill="#0ea5e9" opacity="0.55"/>
  <rect x="10" y="15" width="4" height="10" rx="1" fill="#0ea5e9" opacity="0.7"/>
  <rect x="16" y="10" width="4" height="15" rx="1" fill="#0ea5e9" opacity="0.85"/>
  <rect x="22" y="5"  width="4" height="20" rx="1" fill="#0ea5e9"/>

  <!-- Trend line -->
  <polyline points="6,19 12,14 18,9 24,4"
    fill="none" stroke="#38bdf8" stroke-width="1.5"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points on trend line -->
  <circle cx="6"  cy="19" r="1.8" fill="#0a0a0a" stroke="#38bdf8" stroke-width="1.2"/>
  <circle cx="12" cy="14" r="1.8" fill="#0a0a0a" stroke="#38bdf8" stroke-width="1.2"/>
  <circle cx="18" cy="9"  r="1.8" fill="#0a0a0a" stroke="#38bdf8" stroke-width="1.2"/>
  <circle cx="24" cy="4"  r="1.8" fill="#38bdf8"/>
</svg>
